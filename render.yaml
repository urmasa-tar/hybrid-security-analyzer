# render.yaml
services:
  - type: web
    name: auto-parts-backend
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/auto-parts-store
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: auto-parts-db
          property: connectionString

  - type: web
    name: auto-parts-frontend
    runtime: static
    repo: https://github.com/YOUR_USERNAME/auto-parts-store
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: auto-parts-db
    databaseName: autoparts
    user: postgres
    plan: free